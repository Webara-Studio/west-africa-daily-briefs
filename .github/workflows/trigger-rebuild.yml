name: Trigger Webapp Rebuild

on:
  push:
    branches:
      - master
    paths:
      - 'briefs/**'
      - 'site/data/**'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "✅ Vercel deploy hook triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK secret not set — skipping"
          fi
