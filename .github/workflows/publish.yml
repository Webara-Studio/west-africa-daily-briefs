name: Publish Daily Brief

on:
  push:
    paths:
      - 'briefs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate JSON data feeds
        run: python scripts/build_feeds.py

      - name: Commit feeds
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add site/data/
          git diff --staged --quiet || git commit -m "Update data feeds"
          git push
